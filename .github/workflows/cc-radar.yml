name: cc-radar daily

# 毎朝、7:00前後に受信箱へ届くことを狙って自動実行。手動実行(workflow_dispatch)も可。
# ★【多重cron＝信頼性対策】GitHub無料cronは1回だと遅延/スキップで飛ぶことがある(2026-06-18に実際に全スキップ)。
#   そこで朝に4回(6:35/6:50/7:10/7:25 JST)発火させ、最初に成功した1回だけメール送信する。
#   2通目以降は collect.py が state/last_sent.txt を見て自動スキップ(1日1通保証)。
# ★「正時(:00)・30分(:30)」はGitHub側が最も混雑し飛びやすいので、その帯は避けた分(:35/:50/:10/:25)にしている。
# ★PCの電源状態に依存せず、GitHubのクラウドで動く(手元PCは不要)。
# 注: cronはUTC。JST=UTC+9なので「6:35 JST = 21:35 UTC前日」。
on:
  schedule:
    - cron: "35 21 * * *"   # 6:35 JST（本命・最速着地）
    - cron: "50 21 * * *"   # 6:50 JST（1回目が飛んだ時の保険）
    - cron: "10 22 * * *"   # 7:10 JST（同上）
    - cron: "25 22 * * *"   # 7:25 JST（最終保険）
  workflow_dispatch: {}

# contents: write = 送信マーカー(state/last_sent.txt)をコミットして次の起動と共有するため必須。
# pages: write / id-token: write = GitHub Pages 公開用（メールのみ運用なら deploy 2ステップごと削除可）。
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cc-radar
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      TZ: Asia/Tokyo            # 日付・件名を日本時間で表示
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 収集・サイト生成・メール送信
        env:
          # 値は GitHub の Settings > Secrets and variables > Actions に登録（リポジトリには載らない）
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}      # 任意：AI翻訳・要約
          CC_RADAR_GMAIL_USER: ${{ secrets.CC_RADAR_GMAIL_USER }}  # 任意：Gmail通知
          CC_RADAR_GMAIL_PASS: ${{ secrets.CC_RADAR_GMAIL_PASS }}  # 任意：アプリパスワード
          CC_RADAR_MAIL_TO: ${{ secrets.CC_RADAR_MAIL_TO }}        # 任意：追加宛先（会社アドレス等）
        # 自動(schedule)は重複防止あり＝1日1通。手動(workflow_dispatch)は --force-mail で必ず再送。
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python collect.py --force-mail
          else
            python collect.py
          fi

      - name: 送信マーカーをコミット（多重cronの重複防止の状態を次回起動と共有）
        run: |
          git config user.name "cc-radar-bot"
          git config user.email "jigurumadannjiri-crypto@users.noreply.github.com"
          git add state/last_sent.txt
          if git diff --cached --quiet; then
            echo "送信マーカーに変化なし（本日は別の起動が既に送信済み、またはメール未設定）→ コミット不要"
          else
            git commit -m "chore: 送信マーカー更新（本日送信済み） [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
            echo "送信マーカーをpush（本日この回が初送信）"
          fi

      # ↓ GitHub Pages 公開用（メールのみ運用なら、この2ステップと上の permissions/environment を削除）
      - name: Pages成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: GitHub Pagesへデプロイ
        id: deploy
        uses: actions/deploy-pages@v4
